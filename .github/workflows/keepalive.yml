name: Keep API warm

# The API runs on Render's free tier, which spins the service down after ~15
# minutes of inactivity. A cold start can take 30–60s and, worse, leave the
# app's first request hanging — which is what triggered the App Store
# "activity indicator loads indefinitely" rejection (Guideline 2.1a).
#
# This pings /health every 10 minutes so the backend stays awake for real
# users and for App Review. (The client also has a hard fetch timeout so it
# can never hang regardless — this just keeps the app feeling instant + full.)
#
# NOTE: GitHub disables scheduled workflows after 60 days of repo inactivity,
# and may delay runs under load. For a hard guarantee, also add an external
# monitor (UptimeRobot / cron-job.org) hitting the same URL, or move Render to
# a paid always-on instance.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 60 https://dress-me-api.onrender.com/health || true)
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "health check did not return 200 after retries"
          exit 0
